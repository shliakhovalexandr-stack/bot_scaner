<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Scanner Final</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
        
        /* Рамка прицілу */
        .target-box { width: 220px; height: 220px; border: 2px solid #00e676; border-radius: 15px; position: relative; box-shadow: 0 0 0 1000px rgba(0,0,0,0.5); }
        .target-box::after { content: ""; position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: #ff1744; box-shadow: 0 0 8px #ff1744; animation: scan 2s infinite ease-in-out; }
        
        @keyframes scan { 0%, 100% { top: 10%; } 50% { top: 90%; } }
        
        .controls { position: absolute; top: 20px; pointer-events: auto; }
        #btn { background: #00e676; border: none; padding: 15px 30px; border-radius: 25px; font-weight: bold; }
        .footer { position: absolute; bottom: 30px; pointer-events: auto; }
    </style>
</head>
<body>
    <video id="video" playsinline muted autoplay></video>
    <div class="ui">
        <div class="controls">
            <button id="btn">УВІМКНУТИ СКАНЕР</button>
        </div>
        <div class="target-box"></div>
        <div class="footer">
            <button onclick="window.Telegram.WebApp.close()" style="background:rgba(255,255,255,0.2); border:1px solid #fff; color:#fff; padding:10px 20px; border-radius:20px;">Закрити</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const codeReader = new ZXing.BrowserMultiFormatReader();
        const btn = document.getElementById('btn');

        // Налаштовуємо пошук ТІЛЬКИ DataMatrix
        const hints = new Map();
        hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [ZXing.BarcodeFormat.DATA_MATRIX]);
        hints.set(ZXing.DecodeHintType.TRY_HARDER, true); // Режим "шукати ретельніше"
        codeReader.setHints(hints);

        btn.onclick = async () => {
            const constraints = {
                video: { 
                    facingMode: "environment",
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                }
            };

            try {
                await codeReader.decodeFromConstraints(constraints, 'video', (result, err) => {
                    if (result) {
                        if (navigator.vibrate) navigator.vibrate(100);
                        tg.sendData(result.text);
                        setTimeout(() => tg.close(), 150);
                    }
                });
                btn.style.display = 'none';
            } catch (e) {
                alert("Помилка камери: " + e);
            }
        };
    </script>
</body>
</html>
