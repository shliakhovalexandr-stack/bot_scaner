<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Scanner Kabak</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #scanner-container { position: relative; width: 100%; flex-grow: 1; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; border: 50px solid rgba(0,0,0,0.5); box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .laser { width: 100%; height: 2px; background: #ff1744; box-shadow: 0 0 10px #ff1744; animation: scan 2s infinite; }
        @keyframes scan { 0%, 100% { transform: translateY(-50px); } 50% { transform: translateY(50px); } }
        .ui { position: absolute; top: 20px; width: 100%; text-align: center; z-index: 10; pointer-events: auto; }
        #btn { background: #00e676; border: none; padding: 15px 30px; border-radius: 25px; font-weight: bold; color: #000; }
        .footer { position: absolute; bottom: 30px; width: 100%; text-align: center; pointer-events: auto; }
    </style>
</head>
<body>
    <div id="scanner-container">
        <video id="video" playsinline muted autoplay></video>
        <div class="ui">
            <button id="btn">ВКЛЮЧИТИ КАМЕРУ</button>
        </div>
        <div class="overlay">
            <div class="laser"></div>
        </div>
        <div class="footer">
            <button onclick="window.Telegram.WebApp.close()" style="background:rgba(255,255,255,0.2); border:1px solid #fff; color:#fff; padding:10px 20px; border-radius:20px;">Закрити</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const codeReader = new ZXing.BrowserMultiFormatReader();
        const btn = document.getElementById('btn');

        btn.onclick = async () => {
            const constraints = {
                video: { facingMode: "environment" }
            };

            try {
                // Запускаємо тільки з базовими налаштуваннями, щоб не «злякати» iPhone
                await codeReader.decodeFromConstraints(constraints, 'video', (result, err) => {
                    if (result) {
                        if (navigator.vibrate) navigator.vibrate(100);
                        tg.sendData(result.text);
                        setTimeout(() => tg.close(), 150);
                    }
                });
                btn.style.display = 'none';
            } catch (e) {
                alert("Помилка: " + e);
            }
        };
    </script>
</body>
</html>
