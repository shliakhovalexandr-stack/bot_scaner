<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #scanner-container { position: relative; width: 100%; flex-grow: 1; background: #000; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; align-items: center; z-index: 10; }
        .header { background: rgba(0,0,0,0.8); width: 100%; padding: 20px 0; text-align: center; }
        #start-btn { pointer-events: auto; background: #00e676; border: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; font-size: 16px; margin-top: 10px; box-shadow: 0 4px 15px rgba(0,230,118,0.4); }
        .laser-line { position: absolute; top: 50%; width: 80%; height: 2px; background: #ff1744; box-shadow: 0 0 10px #ff1744; animation: scan 2s infinite; }
        @keyframes scan { 0%, 100% { transform: translateY(-100px); } 50% { transform: translateY(100px); } }
        .footer { position: absolute; bottom: 30px; pointer-events: auto; }
        #close-btn { background: rgba(255,255,255,0.2); border: 1px solid #fff; color: #fff; padding: 10px 30px; border-radius: 20px; }
    </style>
</head>
<body>
    <div id="scanner-container">
        <video id="video" playsinline muted autoplay></video>
        <div class="ui-overlay">
            <div class="header">
                <button id="start-btn">ВКЛЮЧИТЬ КАМЕРУ</button>
            </div>
            <div class="laser-line"></div>
            <div class="footer">
                <button id="close-btn">Закрыть</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const codeReader = new ZXing.BrowserMultiFormatReader();
        const startBtn = document.getElementById('start-btn');

        startBtn.onclick = async () => {
            try {
                const constraints = {
                    video: { facingMode: "environment" }
                };
                
                await codeReader.decodeFromConstraints(constraints, 'video', (result, err) => {
                    if (result) {
                        if (navigator.vibrate) navigator.vibrate(100);
                        tg.sendData(result.text);
                        setTimeout(() => tg.close(), 150);
                    }
                });
                
                startBtn.style.display = 'none'; // Скрываем кнопку после запуска
            } catch (error) {
                alert("Ошибка: " + error);
            }
        };

        document.getElementById('close-btn').onclick = () => tg.close();
    </script>
</body>
</html>
