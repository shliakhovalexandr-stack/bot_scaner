<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Kabak Scanner Fix</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; text-align: center; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #status { padding: 15px; color: #00e676; font-size: 14px; background: rgba(0,0,0,0.8); min-height: 40px; }
        #video-container { position: relative; flex-grow: 1; background: #111; display: flex; align-items: center; justify-content: center; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .controls { padding: 25px; background: #000; }
        button { border: none; border-radius: 12px; font-weight: bold; font-size: 16px; width: 100%; padding: 20px; cursor: pointer; }
        #scan-btn { background: #00e676; color: #000; }
        #capture-btn { background: #ff1744; color: #fff; display: none; }
        canvas { display: none; }
    </style>
</head>
<body>
    <div id="status">Натисніть кнопку запуску</div>
    
    <div id="video-container">
        <video id="video" playsinline muted autoplay></video>
    </div>
    
    <canvas id="canvas"></canvas>

    <div class="controls">
        <button id="scan-btn">1. ЗАПУСТИТИ ЗАДНЮ КАМЕРУ</button>
        <button id="capture-btn">2. СКАНУВАТИ МАРКУ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const video = document.getElementById('video');
        const scanBtn = document.getElementById('scan-btn');
        const captureBtn = document.getElementById('capture-btn');
        const status = document.getElementById('status');
        const canvas = document.getElementById('canvas');
        const codeReader = new ZXing.BrowserMultiFormatReader();

        scanBtn.onclick = async () => {
            status.innerText = "Шукаю задню камеру...";
            try {
                // Отримуємо всі доступні медіа-пристрої
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');

                // Намагаємося знайти камеру, яка має в назві "back", "rear" або "задня"
                // Якщо назв немає (як часто в Safari), беремо останню камеру в списку
                let backCamera = videoDevices.find(device => 
                    device.label.toLowerCase().includes('back') || 
                    device.label.toLowerCase().includes('rear') ||
                    device.label.toLowerCase().includes('environment')
                );

                if (!backCamera && videoDevices.length > 0) {
                    backCamera = videoDevices[videoDevices.length - 1]; // Задня зазвичай остання
                }

                const deviceId = backCamera ? backCamera.deviceId : undefined;

                const constraints = {
                    video: deviceId ? { deviceId: { exact: deviceId } } : { facingMode: "environment" }
                };

                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                video.setAttribute("playsinline", true);
                await video.play();
                
                status.innerText = "Задня камера активована!";
                scanBtn.style.display = "none";
                captureBtn.style.display = "block";
            } catch (err) {
                status.innerText = "Помилка: " + err.message;
                console.error(err);
            }
        };

        captureBtn.onclick = async () => {
            status.innerText = "АНАЛІЗ...";
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);

            try {
                const result = await codeReader.decodeFromCanvas(canvas);
                if (result) {
                    status.innerText = "УСПІХ!";
                    if (navigator.vibrate) navigator.vibrate(100);
                    tg.sendData(result.text);
                    setTimeout(() => tg.close(), 500);
                }
            } catch (e) {
                status.innerText = "Не зчитано. Спробуйте інший ракурс або ближче.";
            }
        };
    </script>
</body>
</html>
