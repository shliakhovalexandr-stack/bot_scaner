<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Kabak Scan</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; }
        #video { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        canvas { display: none; }
        .ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; z-index: 10; }
        .target-box { width: 260px; height: 180px; border: 3px solid #00e676; border-radius: 15px; position: relative; box-shadow: 0 0 0 1000px rgba(0,0,0,0.5); }
        .controls { position: absolute; bottom: 80px; pointer-events: auto; width: 100%; text-align: center; }
        #capture-btn { background: #ff1744; border: 5px solid #fff; width: 70px; height: 70px; border-radius: 50%; cursor: pointer; display: none; }
        #init-btn { background: #00e676; border: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; pointer-events: auto; }
        #status { position: absolute; top: 40px; background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 20px; font-size: 14px; color: #00e676; }
    </style>
</head>
<body>
    <video id="video" playsinline muted autoplay></video>
    <canvas id="canvas"></canvas>
    
    <div class="ui">
        <div id="status">Натисніть кнопку для запуску</div>
        <div class="target-box"></div>
        <div class="controls">
            <button id="init-btn">УВІМКНУТИ КАМЕРУ</button>
            <button id="capture-btn"></button>
        </div>
        <button onclick="window.Telegram.WebApp.close()" style="position: absolute; bottom: 20px; pointer-events: auto; color:#ccc; background:none; border:none;">Закрити</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const captureBtn = document.getElementById('capture-btn');
        const initBtn = document.getElementById('init-btn');
        const status = document.getElementById('status');
        const codeReader = new ZXing.BrowserMultiFormatReader();

        // Налаштування для DataMatrix
        const hints = new Map();
        hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [ZXing.BarcodeFormat.DATA_MATRIX]);
        hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
        codeReader.setHints(hints);

        initBtn.onclick = async () => {
            status.innerText = "Запуск...";
            try {
                // Мінімальний запит без жорстких параметрів якості
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                video.srcObject = stream;
                await video.play();
                
                initBtn.style.display = 'none';
                captureBtn.style.display = 'inline-block';
                status.innerText = "Наведіть та натисніть";
            } catch (err) {
                alert("Доступ заборонено: " + err.message);
                status.innerText = "Помилка доступу";
            }
        };

        captureBtn.onclick = async () => {
            status.innerText = "АНАЛІЗ...";
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            try {
                const result = await codeReader.decodeFromCanvas(canvas);
                if (result) {
                    if (navigator.vibrate) navigator.vibrate(100);
                    tg.sendData(result.text);
                    setTimeout(() => tg.close(), 500);
                }
            } catch (err) {
                status.innerText = "Не розпізнано. Спробуйте ще раз";
                setTimeout(() => { if(status.innerText.includes("Не")) status.innerText = "Наведіть та натисніть"; }, 2000);
            }
        };
    </script>
</body>
</html>
