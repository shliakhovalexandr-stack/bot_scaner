<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; text-align: center; font-family: sans-serif; }
        #video { width: 100vw; height: 70vh; object-fit: cover; background: #222; }
        .controls { padding: 20px; }
        #scan-btn { background: #00e676; border: none; padding: 20px 40px; border-radius: 10px; font-weight: bold; font-size: 18px; width: 80%; }
        #capture-btn { background: #ff1744; border: none; padding: 20px 40px; border-radius: 10px; font-weight: bold; font-size: 18px; width: 80%; display: none; margin-top: 10px; }
        #status { padding: 10px; color: #00e676; min-height: 20px; }
        canvas { display: none; }
    </style>
</head>
<body>
    <div id="status">Натисніть кнопку запуску</div>
    <video id="video" playsinline muted autoplay></video>
    <canvas id="canvas"></canvas>

    <div class="controls">
        <button id="scan-btn">1. ЗАПУСТИТИ КАМЕРУ</button>
        <button id="capture-btn">2. СКАНУВАТИ МАРКУ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const video = document.getElementById('video');
        const scanBtn = document.getElementById('scan-btn');
        const captureBtn = document.getElementById('capture-btn');
        const status = document.getElementById('status');
        const canvas = document.getElementById('canvas');
        const codeReader = new ZXing.BrowserMultiFormatReader();

        scanBtn.onclick = async () => {
            status.innerText = "Запит доступу...";
            try {
                // Найпростіший запит без жодних додаткових параметрів
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                video.setAttribute("playsinline", true); // важливо для iOS
                await video.play();
                
                status.innerText = "Камера готова!";
                scanBtn.style.display = "none";
                captureBtn.style.display = "block";
            } catch (err) {
                status.innerText = "Помилка: " + err.name;
                alert("Треба дозволити камеру в налаштуваннях Telegram/iPhone");
            }
        };

        captureBtn.onclick = async () => {
            status.innerText = "АНАЛІЗ...";
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);

            try {
                const result = await codeReader.decodeFromCanvas(canvas);
                if (result) {
                    tg.sendData(result.text);
                    tg.close();
                }
            } catch (e) {
                status.innerText = "Не зчитано. Спробуйте ще раз.";
            }
        };
    </script>
</body>
</html>
