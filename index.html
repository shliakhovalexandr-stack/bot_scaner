<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; text-align: center; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #status { padding: 15px; color: #00e676; font-size: 14px; min-height: 40px; background: rgba(0,0,0,0.8); }
        #video-container { position: relative; flex-grow: 1; background: #111; display: flex; align-items: center; justify-content: center; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .controls { padding: 25px; background: #000; }
        button { border: none; border-radius: 12px; font-weight: bold; font-size: 16px; width: 100%; padding: 20px; cursor: pointer; }
        #scan-btn { background: #00e676; color: #000; }
        #capture-btn { background: #ff1744; color: #fff; display: none; }
        canvas { display: none; }
    </style>
</head>
<body>
    <div id="status">Натисніть для запуску</div>
    
    <div id="video-container">
        <video id="video" playsinline muted autoplay></video>
    </div>
    
    <canvas id="canvas"></canvas>

    <div class="controls">
        <button id="scan-btn">УВІМКНУТИ КАМЕРУ</button>
        <button id="capture-btn">СКАНУВАТИ МАРКУ (OCR)</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const video = document.getElementById('video');
        const scanBtn = document.getElementById('scan-btn');
        const captureBtn = document.getElementById('capture-btn');
        const status = document.getElementById('status');
        const canvas = document.getElementById('canvas');

        // Глобальна змінна для ID задньої камери
        let backCameraId = null;

        scanBtn.onclick = async () => {
            status.innerText = "Шукаю задню камеру...";
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');

                // Знаходимо задню камеру
                let backCamera = videoDevices.find(device => 
                    device.label.toLowerCase().includes('back') || 
                    device.label.toLowerCase().includes('rear')
                );

                if (!backCamera && videoDevices.length > 0) {
                    backCamera = videoDevices[videoDevices.length - 1];
                }

                backCameraId = backCamera ? backCamera.deviceId : undefined;

                const constraints = {
                    video: backCameraId ? { deviceId: { exact: backCameraId } } : { facingMode: "environment" }
                };

                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                await video.play();
                
                status.innerText = "Наведіть та натисніть кнопку";
                scanBtn.style.display = "none";
                captureBtn.style.display = "block";
            } catch (err) {
                status.innerText = "Помилка: " + err.message;
            }
        };

        captureBtn.onclick = async () => {
            status.innerText = "ОБРОБКА (OCR сервер)...";
            status.style.color = "#ffeb3b";
            
            // Робимо чітке фото з відео
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Перетворюємо фото в формат Base64 (текстовий рядок)
            const imageDataUrl = canvas.toDataURL('image/jpeg', 0.9);

            try {
                // Відправляємо фото на безкоштовний OCR API (наприклад, ocr.space)
                // УВАГА: Для реальної роботи потрібен ваш API KEY, але для тесту використаємо тестовий
                // АБО простіше: відправимо фото назад у Telegram бот, і хай бот його обробить.
                
                // Варіант 1: Відправити Base64 назад у бот (найпростіше для налаштування)
                tg.sendData("OCR_IMAGE:" + imageDataUrl);
                status.innerText = "Відправлено в бот!";
                status.style.color = "#00e676";
                if (navigator.vibrate) navigator.vibrate(100);
                setTimeout(() => tg.close(), 1000);

            } catch (e) {
                status.innerText = "Помилка OCR сервера.";
                status.style.color = "#ff1744";
            }
        };
    </script>
</body>
</html>
