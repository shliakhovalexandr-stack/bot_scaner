<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Kabak Group Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; color: #fff; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #scanner-container { position: relative; width: 100%; flex-grow: 1; overflow: hidden; background: #000; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; z-index: 10; }
        .header { background: rgba(0,0,0,0.7); padding: 20px; text-align: center; }
        .header h2 { margin: 0; font-size: 18px; color: #00e676; letter-spacing: 1px; }
        .laser-line { position: absolute; top: 50%; left: 10%; width: 80%; height: 2px; background-color: #ff1744; box-shadow: 0 0 12px 3px rgba(255, 23, 68, 0.7); animation: scanning 2s infinite ease-in-out; }
        @keyframes scanning { 0%, 100% { transform: translateY(-100px); } 50% { transform: translateY(100px); } }
        .footer { padding: 30px; display: flex; justify-content: center; pointer-events: auto; background: rgba(0,0,0,0.5); }
        #close-btn { background: #333; border: 1px solid #555; color: #fff; padding: 12px 40px; border-radius: 30px; font-size: 14px; }
    </style>
</head>
<body>

    <div id="scanner-container">
        <video id="video"></video>
        <div class="ui-overlay">
            <div class="header">
                <h2>СКАН МАРКИ</h2>
                <p style="font-size: 12px; color: #ccc;">Наведите линию на DataMatrix</p>
            </div>
            <div class="laser-line"></div>
            <div class="footer">
                <button id="close-btn">Закрыть</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const codeReader = new ZXing.BrowserMultiFormatReader();
        const videoElement = document.getElementById('video');
        
        // Настройка только на DataMatrix для скорости
        const hints = new Map();
        hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [ZXing.BarcodeFormat.DATA_MATRIX]);
        codeReader.setHints(hints);

        async function startScanner() {
            const constraints = {
                video: { 
                    facingMode: "environment",
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                }
            };

            try {
                // Запуск потока видео с автоматическим выбором камеры
                await codeReader.decodeFromConstraints(constraints, 'video', (result, err) => {
                    if (result) {
                        if (navigator.vibrate) navigator.vibrate(100);
                        tg.sendData(result.text);
                        setTimeout(() => tg.close(), 150);
                    }
                });
            } catch (error) {
                console.error(error);
                alert("Ошибка доступа к камере. Проверьте разрешения в настройках телефона.");
            }
        }

        document.getElementById('close-btn').onclick = () => tg.close();

        // Запускаем
        window.addEventListener('load', startScanner);
    </script>
</body>
</html>
